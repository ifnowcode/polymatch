<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Poly Match</title>
<style>
  body {
    background:#222;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:20px;
    color:#eee;
    font-family:sans-serif;
  }
  canvas {
    background:#111;
    border:4px solid #555;
    margin-right:20px;
  }
  /* Outer container: horizontal layout */
  #gameContainer {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    gap: 20px;

    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
  }

  /* Scoreboard panel on the left */
  #leftPanel {
    width: 200px;          /* fixed width for stats */
    flex-shrink: 0;        /* prevents collapsing */
  }

  /* Canvas wrapper stays square and responsive */
  #gameWrapper {
    width: 100%;
    max-width: 600px;      /* max board size */
    aspect-ratio: 1 / 1;   /* keeps board square */
    position: relative;
  }

  /* Canvas fills wrapper but does NOT control its own size */
  #game {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

</style>
</head>
<body>

<div id="gameContainer">
  <div id="leftPanel">
    <h2>Poly Match</h2>
    <p>Click one polygon, then click an adjacent polygon to swap.</p>
    <p>Matches of 3+ clear, polygons fall, new ones spawn.</p>
    <select id="modeSel" hidden>
        <option value="3">Test</option>
        <option value="0">Normal</option>
        <option value="1">Poly</option>
        <option value="2">Super</option>
    </select>
    <label style="margin-left: 10px;" hidden>
      <input type="checkbox" id="block" checked hidden>
      Block
    </label>
    <p><span id="score"></span></p>
  </div>

  <div id="gameWrapper">
    <canvas id="game"></canvas>
  </div>

</div>

<script src="animation.js"></script>
<script src="polymatch.js"></script>

</body>
</html>
